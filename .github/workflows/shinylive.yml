name: Deploy Shinylive App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-renv@v2

      - name: Build Shinylive App
        run: |
          # 1. Verify versions from renv.lock
          cat("\n--- DEPLOYMENT VERSIONS ---\n")
          cat("R Version:", as.character(getRversion()), "\n")
          if (requireNamespace("rlang", quietly = TRUE)) {
            cat("rlang:", as.character(packageVersion("rlang")), "\n")
          }
          cat("---------------------------\n\n")
          
          # 2. Install shinylive if not in renv (build tool only)
          if (!requireNamespace("shinylive", quietly = TRUE)) {
            install.packages("shinylive")
          }
          
          # 3. Build the site
          library(shinylive)
          assets_download()
          
          # Export Main App
          export(appdir = ".", destdir = "_site")
          
          # Export V1 Legacy (ensures it is runnable at /v1/ URL)
          export(appdir = "v1", destdir = "_site/v1")
        shell: Rscript {0}

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
