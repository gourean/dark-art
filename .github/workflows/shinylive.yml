name: Deploy Shinylive App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: false

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libarchive-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Build Shinylive App
        run: |
          # 0. Setup clean repositories
          options(repos = c(CRAN = "https://cran.rstudio.com/"))
          
          # 1. Install pak and build tools
          if (!requireNamespace("pak", quietly = TRUE)) install.packages("pak")
          pak::pkg_install(c("shinylive", "archive"))
          
          # 2. Force clean assets download (resolves rlang 1.1.6 mismatch)
          library(shinylive)
          assets_cleanup()
          assets_download()
          
          # 3. Verify versions
          cat("\n--- DEPLOYMENT VERSIONS ---\n")
          cat("R Version:", as.character(getRversion()), "\n")
          if (requireNamespace("rlang", quietly = TRUE)) {
            cat("rlang (Runner):", as.character(packageVersion("rlang")), "\n")
          }
          cat("---------------------------\n\n")
          
          # 4. Build the site
          # Export Main App
          export(appdir = ".", destdir = "_site")
          
          # Export V1 Legacy
          export(appdir = "v1", destdir = "_site/v1")
        shell: Rscript {0}

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
