name: Deploy Shinylive App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install App Dependencies
        run: |
          install.packages("pak", repos = "https://r-lib.github.io/p/pak/devel")
          # Force installation of latest rlang and dependencies
          pak::pkg_install(c("rlang", "shiny", "bslib", "ggplot2", "shinylive", "httpuv"))
          pak::local_install_dev_deps()
          # Print versions for debugging
          cat("rlang version: ", as.character(packageVersion("rlang")), "\n")
          cat("ggplot2 version: ", as.character(packageVersion("ggplot2")), "\n")
        shell: Rscript {0}

      - name: Build Applications
        run: |
          shinylive::assets_download()
          unlink("_site", recursive = TRUE)
          shinylive::export(appdir = ".", destdir = "_site")
        shell: Rscript {0}

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
