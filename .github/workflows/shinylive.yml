name: Deploy Shinylive App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-renv@v2

      - name: Build Shinylive App
        run: |
          # 1. Install pak for robust dependency handling
          if (!requireNamespace("pak", quietly = TRUE)) install.packages("pak")
          
          # 2. Verify versions from renv.lock
          cat("\n--- DEPLOYMENT VERSIONS ---\n")
          cat("R Version:", as.character(getRversion()), "\n")
          if (requireNamespace("rlang", quietly = TRUE)) {
            cat("rlang:", as.character(packageVersion("rlang")), "\n")
          }
          cat("---------------------------\n\n")
          
          # 3. Install shinylive using pak (handles system libs better)
          pak::pkg_install("shinylive")
          
          # 4. Build the site
          # Note: assets_download() is skipped as export() handles it internally.
          library(shinylive)
          
          # Export Main App
          export(appdir = ".", destdir = "_site")
          
          # Export V1 Legacy
          export(appdir = "v1", destdir = "_site/v1")
        shell: Rscript {0}

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
