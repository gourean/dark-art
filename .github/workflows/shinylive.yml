name: Deploy Shinylive App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install App Dependencies
        run: |
          # Install build tools from a reliable CRAN mirror
          install.packages(c("remotes", "shinylive"), repos = "https://cloud.r-project.org")
          # Use an older, stable snapshot for the app's own dependencies
          options(repos = c(CRAN = "https://packagemanager.posit.co/cran/2024-10-01"))
          remotes::install_deps(dependencies = TRUE)
        shell: Rscript {0}

      - name: Build Applications
        run: |
          # Ensure we use the version of shinylive we just installed
          library(shinylive)
          assets_download()
          unlink("_site", recursive = TRUE)
          export(appdir = ".", destdir = "_site")
        shell: Rscript {0}

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
