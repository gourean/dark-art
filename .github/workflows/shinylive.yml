name: Deploy Shinylive App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install Dependencies and Build App
        run: |
          # 1. Setup Binary Repositories (Ubuntu Jammy / 2026-02-24)
          # Use warn=2 to treat warnings as errors during installation
          options(warn = 2)
          options(repos = c(CRAN = "https://p3m.dev/cran/__linux__/jammy/2026-02-24"))
          
          message("Installing build tools...")
          install.packages("shinylive")
          
          message("Installing app dependencies...")
          install.packages(c(
            "shiny", "bslib", "ggplot2", "dplyr", "glue",
            "dunn.test", "scales", "svglite", "ggsignif",
            "colourpicker", "tidyr", "munsell", "DT", "httpuv", "rlang"
          ), dependencies = TRUE)
          
          # 3. Build the App
          if (!requireNamespace("shinylive", quietly = TRUE)) stop("shinylive package not found after installation!")
          
          library(shinylive)
          assets_download()
          unlink("_site", recursive = TRUE)
          export(appdir = ".", destdir = "_site")
        shell: Rscript {0}

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
