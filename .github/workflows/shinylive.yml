name: Deploy Shinylive App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install App Dependencies
        run: |
          install.packages("remotes")
          # Install shinylive from GitHub to ensure latest WebR assets
          remotes::install_github("posit-dev/r-shinylive")
          # Install dependencies from DESCRIPTION
          remotes::install_deps(dependencies = TRUE)
          # Ensure critical packages are up to date
          install.packages(c("rlang", "ggplot2", "shiny", "bslib", "httpuv"))
        shell: Rscript {0}

      - name: Build Applications
        run: |
          library(shinylive)
          assets_download()
          unlink("_site", recursive = TRUE)
          export(appdir = ".", destdir = "_site")
        shell: Rscript {0}

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
