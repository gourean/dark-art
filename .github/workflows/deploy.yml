name: Deploy Shinylive App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: false

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-dev libcurl4-openssl-dev libssl-dev libxml2-dev pkg-config

      - name: Build Applications
        run: |
          # 1. Setup clean repositories and install pak
          options(repos = c(CRAN = "https://cran.rstudio.com/"))
          if (!requireNamespace("pak", quietly = TRUE)) install.packages("pak")
          
          # 2. Install specific compatible versions for WebAssembly
          cat("\n--- ALIGNING VERSIONS FOR WASM ---\n")
          pak::pkg_install(c("shinylive", "archive", "dplyr@1.1.4", "vctrs@0.6.5", "rlang@1.1.6"))
          
          # 3. Install remaining app dependencies
          pak::pkg_install(c("colourpicker", "dunn.test", "ggplot2", "ggsignif", "RColorBrewer", "scales", "tidyr", "bslib", "DT", "glue", "munsell", "svglite"))
          
          # 4. Manual Assets Download (to bypass archive package segfault)
          library(shinylive)
          ASSETS_VER <- "0.10.8"
          CACHE_DIR <- shinylive:::assets_cache_dir()
          DEST_DIR <- file.path(CACHE_DIR, paste0("assets-", ASSETS_VER))
          
          if (!dir.exists(DEST_DIR)) {
            dir.create(CACHE_DIR, recursive = TRUE, showWarnings = FALSE)
            URL <- paste0("https://github.com/posit-dev/shinylive/releases/download/v", ASSETS_VER, "/shinylive-", ASSETS_VER, ".tar.gz")
            TARGZ <- tempfile(fileext = ".tar.gz")
            download.file(URL, TARGZ)
            system(paste0("tar -xzf ", TARGZ, " -C ", CACHE_DIR))
            EXTRACTED <- file.path(CACHE_DIR, paste0("shinylive-", ASSETS_VER))
            if (dir.exists(EXTRACTED) && EXTRACTED != DEST_DIR) {
              file.rename(EXTRACTED, DEST_DIR)
            }
          }
          
          # 5. Run exports safely
          # Export Main App
          shinylive::export(appdir = ".", destdir = "_site")
          
          # Export V1 Legacy
          shinylive::export(appdir = "v1", destdir = "_site/v1")
          
          # Optional: If you wanted a 'review_v1' path, you can export v1 there too
          shinylive::export(appdir = "v1", destdir = "_site/review_v1")
        shell: Rscript {0}
      # ------------------------------------------------------------------------------

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4